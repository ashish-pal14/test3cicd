name: checkout the code

on:
  workflow_dispatch:

jobs:
  job_name:
    runs-on: ubuntu-latest

    steps:
      - name: checkout the code
        uses: actions/checkout@v3

      - name: installing node
        uses: actions/setup-node@v5

      - name: install dependencies
        run: npm install

      - name: test code
        run: npm test
