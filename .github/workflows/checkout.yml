name: checkingout the code

on:
	workflow_dispatch:
		
jobs:
	first_time:
		runs-on: ubuntu-latest
		steps: 
			- name: get code
				uses: action/checkout@v3
			- name: install node
				uses: action/setup-node@v5
			- name: install dependecies
				run: npm install
			- name: run test
				run: npm test